services:
  bank_simulator:
    container_name: bank_simulator
    image: bbyars/mountebank:2.8.1
    ports:
      - "2525:2525"
      - "8080:8080"
    command: --configfile /imposters/imposters.json
    volumes:
      - ./imposters:/imposters

  payment_gateway:
    build: .
    container_name: payment_gateway
    depends_on:
      - bank_simulator
    ports:
      - "8090:8090"
    environment:
      PAYMENT_BANK_BASE_URL: http://bank_simulator:8080
